services:
  web:
    build: ./flask-app
#    ports:
#      - "8080:5000"
    environment:
      - APP_SECRET=supersecret
      - DB_HOST=db
      - DB_NAME=flaskdb
      - DB_USER=flaskuser
      - DB_PASS=flaskpass
    expose:
      - "5000"
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:14
    environment:
      - POSTGRES_USER=flaskuser
      - POSTGRES_PASSWORD=flaskpass
      - POSTGRES_DB=flaskdb
    volumes:
      - dbdata:/var/lib/postresql/data
    restart: unless-stopped
  
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped

volumes:
  dbdata:

